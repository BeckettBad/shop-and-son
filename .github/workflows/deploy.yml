name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Daily ~4am ET — redeploy main as-is so the build-time products.json snapshot
    # stays fresh (the live Storefront layer revalidates at runtime; this keeps the
    # instant-paint snapshot + the no-token fallback from going stale).
    - cron: "0 8 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Configure Pages
        uses: actions/configure-pages@v6
      - name: Build site (homepage → root /shop-and-son/)
        # Public, read-only Storefront token (repo Actions Variables, not Secrets) —
        # Astro inlines these PUBLIC_ vars into the client bundle so the deployed
        # site gets the live catalogue/cart/menu features. Unset (forks/PRs) → the
        # client layer degrades quietly to the build-time snapshot; build stays green.
        env:
          PUBLIC_SHOPIFY_STORE_DOMAIN: ${{ vars.PUBLIC_SHOPIFY_STORE_DOMAIN }}
          PUBLIC_SHOPIFY_STOREFRONT_API_TOKEN: ${{ vars.PUBLIC_SHOPIFY_STOREFRONT_API_TOKEN }}
        run: |
          cd homepage
          npm ci
          npm run build
      # The pre-order site is served via homepage/public/preorders (a symlink to the
      # single source at repo-root public/preorders), so `astro build` already emits
      # it to dist/preorders — no separate copy step needed.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./homepage/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
