name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Build site (homepage-v2 → root /shop-and-son/)
        run: |
          cd homepage-v2
          npm ci
          npm run build
      - name: "Bundle the pre-order site at /preorders/ (single source: public/preorders)"
        run: cp -R public/preorders homepage-v2/dist/preorders
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./homepage-v2/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
